<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="grad-client" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C084FC" />
      <stop offset="100%" stop-color="#A855F7" />
    </linearGradient>
    <linearGradient id="grad-gateway" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE" />
      <stop offset="100%" stop-color="#0891B2" />
    </linearGradient>
    <linearGradient id="grad-vertex" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#2563EB" />
    </linearGradient>
    <linearGradient id="grad-gemini" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399" />
      <stop offset="50%" stop-color="#60A5FA" />
      <stop offset="100%" stop-color="#818CF8" />
    </linearGradient>

    <!-- Filters for Glow -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    /* Dark Mode Theme / Responsive Styles */
    .bg { fill: #0B0F19; rx: 16px; }
    .node-text { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: 700; fill: #FFFFFF; }
    .sub-text { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 11px; fill: #94A3B8; }
    .api-text { font-family: 'Fira Code', monospace; font-size: 10px; fill: #38BDF8; font-weight: 500; }
    
    /* Animation Keyframes */
    @keyframes pulse {
      0% { r: 4px; opacity: 1; }
      100% { r: 12px; opacity: 0; }
    }
    @keyframes dash {
      to {
        stroke-dashoffset: -40;
      }
    }
    @keyframes flow-dot {
      0% { offset-distance: 0%; opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { offset-distance: 100%; opacity: 0; }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    /* Classes */
    .pulse-circle { animation: pulse 2s infinite ease-out; }
    .pulse-circle-2 { animation: pulse 2s infinite ease-out 1s; }
    .flow-line-req {
      stroke: #A855F7;
      stroke-width: 2.5;
      stroke-dasharray: 8 6;
      animation: dash 1.5s linear infinite;
    }
    .flow-line-res {
      stroke: #22D3EE;
      stroke-width: 2.5;
      stroke-dasharray: 8 6;
      animation: dash 1.5s linear infinite reverse;
    }
    .flow-line-vertex-req {
      stroke: #0891B2;
      stroke-width: 2.5;
      stroke-dasharray: 8 6;
      animation: dash 1.2s linear infinite;
    }
    .flow-line-vertex-res {
      stroke: #60A5FA;
      stroke-width: 2.5;
      stroke-dasharray: 8 6;
      animation: dash 1.2s linear infinite reverse;
    }
    .node-group { animation: bounce 4s ease-in-out infinite; }
    .node-group-delay { animation: bounce 4s ease-in-out infinite 2s; }
  </style>

  <!-- Background -->
  <rect class="bg" width="100%" height="100%" />
  
  <!-- Subtle grid lines -->
  <g stroke="#1E293B" stroke-width="1" opacity="0.3">
    <line x1="50" y1="0" x2="50" y2="250" />
    <line x1="150" y1="0" x2="150" y2="250" />
    <line x1="250" y1="0" x2="250" y2="250" />
    <line x1="350" y1="0" x2="350" y2="250" />
    <line x1="450" y1="0" x2="450" y2="250" />
    <line x1="550" y1="0" x2="550" y2="250" />
    <line x1="650" y1="0" x2="650" y2="250" />
    <line x1="750" y1="0" x2="750" y2="250" />
    <line x1="0" y1="50" x2="800" y2="50" />
    <line x1="0" y1="100" x2="800" y2="100" />
    <line x1="0" y1="150" x2="800" y2="150" />
    <line x1="0" y1="200" x2="800" y2="200" />
  </g>

  <!-- Connection Lines (Paths) -->
  <!-- Client to Gateway (Request - Upper Line) -->
  <path d="M 170 105 Q 285 75 400 105" fill="none" class="flow-line-req" />
  
  <!-- Gateway to Client (Response - Lower Line) -->
  <path d="M 400 145 Q 285 175 170 145" fill="none" class="flow-line-res" />

  <!-- Gateway to Vertex (Request - Upper Line) -->
  <path d="M 460 105 Q 565 75 670 105" fill="none" class="flow-line-vertex-req" />
  
  <!-- Vertex to Gateway (Response - Lower Line) -->
  <path d="M 670 145 Q 565 175 460 145" fill="none" class="flow-line-vertex-res" />

  <!-- Labels on Paths -->
  <text x="285" y="65" text-anchor="middle" class="api-text">POST /v1/chat/completions</text>
  <text x="285" y="195" text-anchor="middle" class="api-text" fill="#34D399">SSE Stream / JSON Response</text>
  
  <text x="565" y="65" text-anchor="middle" class="api-text" fill="#818CF8">Vertex API: generateContent</text>
  <text x="565" y="195" text-anchor="middle" class="api-text" fill="#60A5FA">JSON / Server Stream</text>

  <!-- Node 1: Client Application -->
  <g class="node-group" transform="translate(0, 0)">
    <!-- Glow -->
    <rect x="50" y="90" width="120" height="70" rx="12" fill="#C084FC" opacity="0.15" filter="url(#glow-purple)" />
    <!-- Main Box -->
    <rect x="50" y="90" width="120" height="70" rx="12" fill="#131B2E" stroke="#A855F7" stroke-width="2" />
    <!-- Accent line -->
    <path d="M 50 102 L 170 102" stroke="#A855F7" stroke-width="1" opacity="0.5" />
    <circle cx="68" cy="125" r="8" fill="url(#grad-client)" />
    <text x="86" y="129" class="node-text">Client App</text>
    <text x="86" y="145" class="sub-text">Your Services</text>
  </g>

  <!-- Node 2: Go LLM Gateway (The Core) -->
  <g class="node-group-delay" transform="translate(0, 0)">
    <!-- Glow -->
    <rect x="370" y="80" width="120" height="90" rx="14" fill="#22D3EE" opacity="0.2" filter="url(#glow-cyan)" />
    <!-- Main Box -->
    <rect x="370" y="80" width="120" height="90" rx="14" fill="#0F172A" stroke="#06B6D4" stroke-width="2.5" />
    <!-- Inner glowing dot -->
    <circle cx="430" cy="125" r="4" fill="#22D3EE" />
    <circle cx="430" cy="125" r="4" fill="none" stroke="#22D3EE" stroke-width="1.5" class="pulse-circle" />
    <circle cx="430" cy="125" r="4" fill="none" stroke="#22D3EE" stroke-width="1.5" class="pulse-circle-2" />
    <text x="430" y="110" text-anchor="middle" class="node-text" fill="#22D3EE">Go Gateway</text>
    <text x="430" y="145" text-anchor="middle" class="sub-text" fill="#E2E8F0">OpenAI compatible</text>
    <text x="430" y="158" text-anchor="middle" class="sub-text" font-size="9px">Auth &amp; Request Map</text>
  </g>

  <!-- Node 3: Vertex AI & Gemini -->
  <g class="node-group" transform="translate(0, 0)">
    <!-- Glow -->
    <rect x="630" y="90" width="120" height="70" rx="12" fill="#60A5FA" opacity="0.15" filter="url(#glow-blue)" />
    <!-- Main Box -->
    <rect x="630" y="90" width="120" height="70" rx="12" fill="#131B2E" stroke="#3B82F6" stroke-width="2" />
    <!-- Accent line -->
    <path d="M 630 102 L 750 102" stroke="#3B82F6" stroke-width="1" opacity="0.5" />
    <!-- Gemini Star representation -->
    <circle cx="648" cy="125" r="8" fill="url(#grad-gemini)" />
    <text x="666" y="129" class="node-text">Vertex AI</text>
    <text x="666" y="145" class="sub-text">Gemini Engine</text>
  </g>
</svg>
